<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geomdan Link</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    body {
      color: white;
      text-align: center;
      position: relative;
      min-height: 100vh;
    }

    /* 배경 영상 */
    .bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: -2;
    }

    /* 어두운 오버레이 */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: -1;
    }

    /* 본문 */
    .container {
      max-width: 420px;
      margin: 0 auto;
      padding: 50px 20px;
    }

    .profile-img {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 20px;
      border: 3px solid rgba(255,255,255,0.7);
    }

    h1 {
      font-size: 48px;
      margin-bottom: 16px;
      font-weight: 700;
    }

    p {
      font-size: 28px;
      margin-bottom: 30px;
    }

    .link-btn {
      display: block;
      margin: 16px auto;
      padding: 18px 20px;
      width: 100%;
      max-width: 350px;
      background: #22c55e;
      color: white;
      text-decoration: none;
      border-radius: 14px;
      font-size: 18px;
      font-weight: bold;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .link-btn:hover {
      transform: translateY(-2px);
      opacity: 0.95;
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 34px;
      }

      p {
        font-size: 20px;
      }

      .link-btn {
        font-size: 16px;
        padding: 16px;
      }
    }
  </style>
</head>
<body>

  <!-- 배경 영상 -->
  <video class="bg-video" autoplay muted loop playsinline>
    <source src="background.mp4" type="video/mp4" />
  </video>

  <!-- 어둡게 덮는 레이어 -->
  <div class="overlay"></div>

  <div class="container">
    <img class="profile-img" src="profile.jpg" alt="profile" />

    <h1>@yourname</h1>
    <p>Simple. Effective. Freeup.</p>

    <a class="link-btn" href="#"검단 지하철 관련 바로가기</a>
    <a class="link-btn" href="#">검단 지역단체 사이트 바로가기</a>
    <a class="link-btn" href="#">검단신도시 연구소 카페 바로가기</a>
    <a class="link-btn" href="#">문의하기</a>
  </div>

</body>
</html>
